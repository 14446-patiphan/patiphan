
<script>

// ==========================
// สร้างดาวระยิบระยับ
// ==========================

for(let i=0;i<60;i++){

    const star=document.createElement("div");

    star.style.position="fixed";
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.width="3px";
    star.style.height="3px";
    star.style.background="white";
    star.style.borderRadius="50%";
    star.style.opacity=Math.random();
    star.style.boxShadow="0 0 10px white";
    star.style.animation="twinkle "+(2+Math.random()*3)+"s infinite";
    star.style.zIndex="-1";

    document.body.appendChild(star);

}

// ==========================
// สร้างหิมะตก
// ==========================

function snow(){

    const s=document.createElement("div");

    s.innerHTML=["❄","❅","❆"][Math.floor(Math.random()*3)];

    s.style.position="fixed";
    s.style.left=Math.random()*window.innerWidth+"px";
    s.style.top="-30px";
    s.style.fontSize=(10+Math.random()*18)+"px";
    s.style.color="white";
    s.style.pointerEvents="none";
    s.style.zIndex="9999";
    s.style.textShadow="0 0 10px white";

    document.body.appendChild(s);

    let x=Math.random()*2-1;
    let y=-30;
    let speed=1+Math.random()*2;

    const move=setInterval(()=>{

        y+=speed;
        x+=Math.sin(y/50)*0.2;

        s.style.top=y+"px";
        s.style.left=parseFloat(s.style.left)+x+"px";
        s.style.transform="rotate("+y+"deg)";

        if(y>window.innerHeight+50){

            clearInterval(move);
            s.remove();

        }

    },20);

}

setInterval(snow,80);


// ==========================
// ข้อความเรืองแสง
// ==========================

document.querySelector("h1").style.animation="glow 2s infinite alternate";


// ==========================
// การ์ดเด้งเมื่อโหลด
// ==========================

document.querySelectorAll(".card").forEach((card,index)=>{

    card.style.opacity="0";
    card.style.transform="translateY(50px)";

    setTimeout(()=>{

        card.style.transition="1s";
        card.style.opacity="1";
        card.style.transform="translateY(0)";

    },index*300);

});

</script>

<style>

@keyframes twinkle{

0%,100%{

opacity:.2;
transform:scale(1);

}

50%{

opacity:1;
transform:scale(2);

}

}

@keyframes glow{

from{

text-shadow:0 0 10px #2196f3;

}

to{

text-shadow:
0 0 15px white,
0 0 30px #2196f3,
0 0 45px #64b5f6;

}

}

</style>

</body>
</html>

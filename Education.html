
<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ประวัติการศึกษา | ปฏิภาณ</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#e3f2fd,#2196f3);
    overflow:hidden;
}

/* Navbar */

nav{
    width:100%;
    background:white;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

nav h2{
    color:#0d47a1;
    font-size:28px;
}

ul{
    display:flex;
    list-style:none;
    gap:20px;
}

ul li a{
    text-decoration:none;
    color:#1565c0;
    font-weight:600;
    padding:10px 18px;
    border-radius:30px;
    transition:.3s;
}

ul li a:hover{
    background:#2196f3;
    color:white;
    transform:translateY(-3px);
}

/* Content */

.container{
    width:90%;
    max-width:900px;
    margin:50px auto;
    background:white;
    padding:40px;
    border-radius:30px;
    box-shadow:0 20px 50px rgba(0,0,0,.2);
    text-align:center;
    position:relative;
    z-index:5;
}

h1{
    color:#0d47a1;
    font-size:42px;
    margin-bottom:35px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{

    from{
        text-shadow:0 0 10px #2196f3;
    }

    to{
        text-shadow:
        0 0 15px white,
        0 0 30px #2196f3,
        0 0 45px #64b5f6;
    }

}

.line{
    width:130px;
    height:5px;
    background:#2196f3;
    margin:-20px auto 40px;
    border-radius:20px;
}

/* Card */

.card{
    background:#eef8ff;
    border-radius:25px;
    padding:25px;
    margin:25px 0;
    text-align:left;
    border-left:8px solid #2196f3;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
    transition:.4s;
}

.card:hover{
    transform:translateY(-8px) scale(1.02);
    background:#dff2ff;
}

.card h2{
    color:#0066cc;
    font-size:28px;
    margin-bottom:15px;
}

.card p{
    color:#444;
    font-size:20px;
    margin:8px 0;
}

/* ดาว */

.star{
    position:fixed;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 10px white;
    animation:twinkle 2s infinite;
    z-index:0;
}

@keyframes twinkle{
    0%,100%{
        opacity:.2;
        transform:scale(1);
    }
    50%{
        opacity:1;
        transform:scale(2);
    }
}

/* หิมะ */

.snowflake{
    position:fixed;
    top:-30px;
    color:white;
    pointer-events:none;
    user-select:none;
    text-shadow:0 0 10px white;
    animation:fall linear forwards;
    z-index:9999;
}

@keyframes fall{
    from{
        transform:translateY(-30px);
    }
    to{
        transform:translateY(110vh);
    }
}

@media(max-width:700px){

    nav{
        flex-direction:column;
    }

    ul{
        flex-direction:column;
        text-align:center;
        margin-top:15px;
    }

    h1{
        font-size:30px;
    }

    .card p{
        font-size:17px;
    }

}

</style>

</head>

<body>

<nav>

<h2>💙 Portfolio</h2>

<ul>

<li><a href="index.html">หน้าแรก</a></li>

<li><a href="profile.html">ประวัติ</a></li>

<li><a href="education.html">การศึกษา</a></li>

<li><a href="award.html">ผลงาน</a></li>

<li><a href="contact.html">ติดต่อ</a></li>

</ul>

</nav>

<div class="container">

<h1>🎓 ประวัติการศึกษา</h1>

<div class="line"></div>

<div class="card">

<h2>📚 ระดับประถมศึกษา</h2>

<p>🏫 โรงเรียนเตรียมบัณฑิต</p>

<p>🏫 โรงเรียนวัดอู่ตะเภา</p>

</div>

<div class="card">

<h2>🎒 ระดับมัธยมศึกษา</h2>

<p>🏫 โรงเรียนพานทอง</p>

</div>

</div>

<script>

// ดาว

for(let i=0;i<70;i++){

    const star=document.createElement("div");

    star.className="star";

    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.animationDelay=Math.random()*2+"s";

    document.body.appendChild(star);

}

// หิมะ

function createSnow(){

    const snow=document.createElement("div");

    snow.className="snowflake";

    const icon=["❄","❅","❆"];

    snow.innerHTML=icon[Math.floor(Math.random()*3)];

    snow.style.left=Math.random()*window.innerWidth+"px";

    snow.style.fontSize=(10+Math.random()*20)+"px";

    snow.style.opacity=Math.random();

    snow.style.animationDuration=(5+Math.random()*5)+"s";

    document.body.appendChild(snow);

    let x=Math.random()*2-1;
    let y=-30;

    const move=setInterval(()=>{

        y+=2;
        x+=Math.sin(y/50)*0.2;

        snow.style.top=y+"px";
        snow.style.left=parseFloat(snow.style.left)+x+"px";
        snow.style.transform="rotate("+y+"deg)";

        if(y>window.innerHeight+40){

            clearInterval(move);

            snow.remove();

        }

    },20);

}

setInterval(createSnow,80);

// การ์ดเลื่อนขึ้น

document.querySelectorAll(".card").forEach((card,index)=>{

    card.style.opacity="0";
    card.style.transform="translateY(60px)";

    setTimeout(()=>{

        card.style.transition="1s";
        card.style.opacity="1";
        card.style.transform="translateY(0)";

    },index*300);

});

</script>

</body>
</html>

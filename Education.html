
<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ประวัติการศึกษา | ปฏิภาณ</title>


<style>

@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap');


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}


body{

    min-height:100vh;

    background:linear-gradient(135deg,#e3f2fd,#2196f3);

}



/* Navbar */

nav{

    width:100%;

    background:white;

    padding:20px 8%;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-shadow:0 5px 20px rgba(0,0,0,.15);

}



nav h2{

    color:#0d47a1;

    font-size:28px;

}



ul{

    display:flex;

    list-style:none;

    gap:20px;

}



ul li a{

    text-decoration:none;

    color:#1565c0;

    font-weight:600;

    padding:10px 18px;

    border-radius:30px;

    transition:.3s;

}



ul li a:hover{

    background:#2196f3;

    color:white;

}



/* Content */


.container{

    width:90%;

    max-width:900px;

    margin:50px auto;

    background:white;

    padding:40px;

    border-radius:30px;

    box-shadow:0 20px 50px rgba(0,0,0,.2);

    text-align:center;

}



h1{

    color:#0d47a1;

    font-size:42px;

    margin-bottom:35px;

}



.line{

    width:130px;

    height:5px;

    background:#2196f3;

    margin:-20px auto 40px;

    border-radius:20px;

}



/* Card */


.card{

    background:#eef8ff;

    border-radius:25px;

    padding:25px;

    margin:25px 0;

    text-align:left;

    border-left:8px solid #2196f3;

    box-shadow:0 10px 25px rgba(0,0,0,.1);

    transition:.4s;

}



.card:hover{

    transform:translateY(-8px);

    background:#dff2ff;

}



.card h2{

    color:#0066cc;

    font-size:28px;

    margin-bottom:15px;

}



.card p{

    color:#444;

    font-size:20px;

    margin:8px 0;

}



.icon{

    font-size:35px;

}



/* Mobile */

@media(max-width:700px){

    nav{

        flex-direction:column;

    }


    ul{

        flex-direction:column;

        text-align:center;

        margin-top:15px;

    }


    h1{

        font-size:30px;

    }


    .card p{

        font-size:17px;

    }

}


</style>


</head>



<body>



<nav>

</ul>


</nav>



<div class="container">


<h1>🎓 ประวัติการศึกษา</h1>

<div class="line"></div>



<div class="card">

<h2>📚 ระดับประถมศึกษา</h2>

<p>🏫 โรงเรียนเตรียมบัณฑิต</p>

<p>🏫 โรงเรียนวัดอู่ตะเภา</p>

</div>



<div class="card">

<h2>🎒 ระดับมัธยมศึกษา</h2>

<p>🏫 โรงเรียนพานทอง</p>

</div>



</div>



</body>

</html>


<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | ปฏิภาณ</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap');


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}


body{

    min-height:100vh;

    background:
    linear-gradient(135deg,#0d47a1,#2196f3,#e3f2fd);

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

}


/* แสงพื้นหลัง */

body::before{

    content:"";

    position:absolute;

    width:500px;

    height:500px;

    background:#ffffff;

    opacity:0.15;

    border-radius:50%;

    top:-150px;

    right:-150px;

}


body::after{

    content:"";

    position:absolute;

    width:400px;

    height:400px;

    background:#00bfff;

    opacity:0.2;

    border-radius:50%;

    bottom:-150px;

    left:-100px;

}



.container{

    position:relative;

    z-index:1;

    width:90%;

    max-width:900px;

    background:rgba(255,255,255,0.9);

    backdrop-filter:blur(15px);

    border-radius:30px;

    padding:40px;

    box-shadow:

    0 25px 60px rgba(0,0,0,0.25);

    text-align:center;

}



/* Navbar */


nav{

    margin-bottom:35px;

}


nav a{

    text-decoration:none;

    color:#0d47a1;

    font-weight:600;

    background:white;

    padding:12px 22px;

    border-radius:50px;

    margin:6px;

    display:inline-block;

    box-shadow:0 5px 15px rgba(0,0,0,.15);

    transition:.4s;

}


nav a:hover{

    color:white;

    background:#1565c0;

    transform:translateY(-6px);

}



/* Profile */


.profile img{

    width:230px;

    height:230px;

    object-fit:cover;

    border-radius:50%;

    border:8px solid white;

    outline:5px solid #2196f3;

    box-shadow:0 15px 35px rgba(0,0,0,.3);

    animation:float 3s infinite ease-in-out;

}



@keyframes float{

    50%{

        transform:translateY(-12px);

    }

}



h1{

    margin-top:30px;

    font-size:42px;

    color:#0d47a1;

    font-weight:700;

}



.subtitle{

    margin-top:15px;

    color:#555;

    font-size:22px;

}



.school{

    margin-top:8px;

    color:#2196f3;

    font-size:22px;

    font-weight:600;

}



.line{

    width:150px;

    height:5px;

    background:#2196f3;

    margin:25px auto;

    border-radius:20px;

}



.tag{

    display:inline-block;

    margin-top:25px;

    padding:12px 35px;

    border-radius:50px;

    background:#0d47a1;

    color:white;

    font-size:18px;

    box-shadow:0 10px 25px rgba(13,71,161,.4);

}




@media(max-width:600px){

    .container{

        padding:25px;

    }


    nav a{

        display:block;

    }


    .profile img{

        width:170px;

        height:170px;

    }


    h1{

        font-size:28px;

    }

}


</style>


</head>



<body>


<div class="container">


<nav>

</nav>

</h1>

</p>

</div>


</body>

</html>

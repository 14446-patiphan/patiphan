<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | ปฏิภาณ</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0d47a1,#2196f3,#e3f2fd);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* วงกลมพื้นหลัง */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#ffffff;
    opacity:.15;
    border-radius:50%;
    top:-150px;
    right:-150px;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#00bfff;
    opacity:.2;
    border-radius:50%;
    bottom:-150px;
    left:-100px;
}

/* ดาว */

.star{
    position:fixed;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite;
    z-index:0;
}

@keyframes twinkle{
    0%,100%{
        opacity:.3;
        transform:scale(1);
    }
    50%{
        opacity:1;
        transform:scale(2);
    }
}

/* หิมะ */

.snowflake{
    position:fixed;
    top:-30px;
    color:white;
    pointer-events:none;
    user-select:none;
    animation:fall linear forwards;
    text-shadow:0 0 10px white;
    z-index:999;
}

@keyframes fall{
    from{
        transform:translateY(-30px) rotate(0deg);
    }

    to{
        transform:translateY(110vh) rotate(360deg);
    }
}

.container{

    position:relative;
    z-index:5;

    width:90%;
    max-width:900px;

    background:rgba(255,255,255,.9);

    backdrop-filter:blur(15px);

    border-radius:30px;

    padding:40px;

    box-shadow:0 25px 60px rgba(0,0,0,.25);

    text-align:center;

}

/* Navbar */

nav{
    margin-bottom:35px;
}

nav a{

    text-decoration:none;

    color:#0d47a1;

    font-weight:600;

    background:white;

    padding:12px 22px;

    border-radius:50px;

    margin:6px;

    display:inline-block;

    box-shadow:0 5px 15px rgba(0,0,0,.15);

    transition:.4s;

    position:relative;

    overflow:hidden;

}

nav a::before{

    content:"";

    position:absolute;

    top:0;

    left:-120%;

    width:100%;

    height:100%;

    background:rgba(255,255,255,.5);

    transform:skewX(-30deg);

    transition:.6s;

}

nav a:hover::before{

    left:120%;

}

nav a:hover{

    color:white;

    background:#1565c0;

    transform:translateY(-6px);

}

/* รูป */

.profile img{

    width:230px;

    height:230px;

    object-fit:cover;

    border-radius:50%;

    border:8px solid white;

    outline:5px solid #2196f3;

    box-shadow:0 15px 35px rgba(0,0,0,.3);

    animation:
    float 3s ease-in-out infinite,
    glow 2s infinite alternate;

    transition:.4s;

}

.profile img:hover{

    transform:scale(1.08);

}

@keyframes float{

    50%{

        transform:translateY(-12px);

    }

}

@keyframes glow{

    from{

        box-shadow:0 0 20px #2196f3;

    }

    to{

        box-shadow:
        0 0 35px white,
        0 0 55px #2196f3;

    }

}

/* ชื่อ */

h1{

    margin-top:30px;

    font-size:42px;

    color:#0d47a1;

    text-shadow:
    0 0 10px #2196f3,
    0 0 20px white;

}

.subtitle{

    margin-top:15px;

    color:#555;

    font-size:22px;

}

.school{

    margin-top:8px;

    color:#2196f3;

    font-size:22px;

    font-weight:600;

}

.line{

    width:150px;

    height:5px;

    background:#2196f3;

    margin:25px auto;

    border-radius:20px;

}

.tag{

    display:inline-block;

    margin-top:25px;

    padding:12px 35px;

    border-radius:50px;

    background:#0d47a1;

    color:white;

    font-size:18px;

    box-shadow:0 10px 25px rgba(13,71,161,.4);

    animation:pulse 2s infinite;

}

@keyframes pulse{

    50%{

        transform:scale(1.08);

    }

}

@media(max-width:600px){

.container{
padding:25px;
}

nav a{
display:block;
}

.profile img{
width:170px;
height:170px;
}

h1{
font-size:28px;
}

}

</style>

</head>

<body>

<div class="container">

<nav>

<a href="profile.html">👤 ประวัติส่วนตัว</a>

<a href="Education.html">🎓 ประวัติการศึกษา</a>

<a href="award.html">🏆 ผลงาน</a>

<a href="contact.html">📞 ติดต่อ</a>

</nav>

<div class="profile">

<img src="images/1783507008770.jpg" alt="รูปโปรไฟล์">

<h1>นายปฏิภาณ ศรีประสิทธิ์</h1>

<div class="line"></div>

<p class="subtitle">นักเรียนชั้น ม.6/1</p>

<p class="school">โรงเรียนพานทอง</p>

<div class="tag">MY PORTFOLIO 2026</div>

</div>

</div>

<script>

// สร้างดาว

for(let i=0;i<80;i++){

    let star=document.createElement("div");

    star.className="star";

    star.style.left=Math.random()*100+"vw";

    star.style.top=Math.random()*100+"vh";

    star.style.animationDelay=Math.random()*2+"s";

    document.body.appendChild(star);

}

// สร้างหิมะ

function snow(){

    const s=document.createElement("div");

    s.className="snowflake";

    const icon=["❄","❅","❆"];

    s.innerHTML=icon[Math.floor(Math.random()*icon.length)];

    s.style.left=Math.random()*window.innerWidth+"px";

    s.style.fontSize=(10+Math.random()*20)+"px";

    s.style.animationDuration=(5+Math.random()*6)+"s";

    s.style.opacity=Math.random();

    document.body.appendChild(s);

    setTimeout(()=>{

        s.remove();

    },11000);

}

setInterval(snow,120);

</script>

</body>

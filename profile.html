<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | ปฏิภาณ</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap');


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}


body{

    min-height:100vh;

    background:
    linear-gradient(135deg,#0d47a1,#2196f3,#e3f2fd);

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

}


/* แสงพื้นหลัง */

body::before{

    content:"";

    position:absolute;

    width:500px;

    height:500px;

    background:#ffffff;

    opacity:0.15;

    border-radius:50%;

    top:-150px;

    right:-150px;

}


body::after{

    content:"";

    position:absolute;

    width:400px;

    height:400px;

    background:#00bfff;

    opacity:0.2;

    border-radius:50%;

    bottom:-150px;

    left:-100px;

}



.container{

    position:relative;

    z-index:1;

    width:90%;

    max-width:900px;

    background:rgba(255,255,255,0.9);

    backdrop-filter:blur(15px);

    border-radius:30px;

    padding:40px;

    box-shadow:

    0 25px 60px rgba(0,0,0,0.25);

    text-align:center;

}



/* Navbar */


nav{

    margin-bottom:35px;

}


nav a{

    text-decoration:none;

    color:#0d47a1;

    font-weight:600;

    background:white;

    padding:12px 22px;

    border-radius:50px;

    margin:6px;

    display:inline-block;

    box-shadow:0 5px 15px rgba(0,0,0,.15);

    transition:.4s;

}


nav a:hover{

    color:white;

    background:#1565c0;

    transform:translateY(-6px);

}



/* Profile */


.profile img{

    width:230px;

    height:230px;

    object-fit:cover;

    border-radius:50%;

    border:8px solid white;

    outline:5px solid #2196f3;

    box-shadow:0 15px 35px rgba(0,0,0,.3);

    animation:float 3s infinite ease-in-out;

}



@keyframes float{

    50%{

        transform:translateY(-12px);

    }

}



h1{

    margin-top:30px;

    font-size:42px;

    color:#0d47a1;

    font-weight:700;

}



.subtitle{

    margin-top:15px;

    color:#555;

    font-size:22px;

}



.school{

    margin-top:8px;

    color:#2196f3;

    font-size:22px;

    font-weight:600;

}



.line{

    width:150px;

    height:5px;

    background:#2196f3;

    margin:25px auto;

    border-radius:20px;

}



.tag{

    display:inline-block;

    margin-top:25px;

    padding:12px 35px;

    border-radius:50px;

    background:#0d47a1;

    color:white;

    font-size:18px;

    box-shadow:0 10px 25px rgba(13,71,161,.4);

}




@media(max-width:600px){

    .container{

        padding:25px;

    }


    nav a{

        display:block;

    }


    .profile img{

        width:170px;

        height:170px;

    }


    h1{

        font-size:28px;

    }

}


</style>


</head>



<body>


<div class="container">


<nav>

<a href="profile.html">👤 ประวัติส่วนตัว</a>

<a href="Education.html">🎓 ประวัติการศึกษา</a>

<a href="award.html">🏆 ผลงาน</a>

<a href="contact.html">📞 ติดต่อ</a>

</nav>



<div class="profile">


<img src="images/1783507008770.jpg">


<h1>
นายปฏิภาณ ศรีประสิทธิ์
</h1>


<div class="line"></div>


<p class="subtitle">
นักเรียนชั้น ม.6/1
</p>


<p class="school">
โรงเรียนพานทอง
</p>


<div class="tag">
MY PORTFOLIO 2026
</div>


</div>


</div>


</body>

</html> 
<script>
// =============================
// เมาส์มีประกายแสง
// =============================
document.addEventListener("mousemove",function(e){

    const spark=document.createElement("div");

    spark.style.position="fixed";
    spark.style.left=e.clientX+"px";
    spark.style.top=e.clientY+"px";
    spark.style.width="8px";
    spark.style.height="8px";
    spark.style.background="white";
    spark.style.borderRadius="50%";
    spark.style.pointerEvents="none";
    spark.style.boxShadow="0 0 15px #fff";
    spark.style.zIndex="9999";
    spark.style.transition="all .8s ease";

    document.body.appendChild(spark);

    setTimeout(()=>{
        spark.style.opacity="0";
        spark.style.transform="scale(3)";
    },10);

    setTimeout(()=>{
        spark.remove();
    },800);

});


// =============================
// เปลี่ยนสีป้าย Portfolio
// =============================
const tag=document.querySelector(".tag");

const colors=[
"#0d47a1",
"#1565c0",
"#1e88e5",
"#42a5f5",
"#1976d2"
];

let c=0;

setInterval(()=>{

    c++;

    tag.style.background=colors[c%colors.length];

},1000);


// =============================
// ข้อความชื่อกระพริบ
// =============================
const title=document.querySelector("h1");

setInterval(()=>{

    title.style.textShadow=
    "0 0 10px #fff,0 0 20px #64b5f6,0 0 35px #2196f3";

    setTimeout(()=>{

        title.style.textShadow=
        "0 0 10px #2196f3,0 0 20px white";

    },500);

},1500);


// =============================
// เมนูเด้งอัตโนมัติ
// =============================
document.querySelectorAll("nav a").forEach(btn=>{

    btn.addEventListener("mouseenter",()=>{

        btn.animate([
            {transform:"translateY(0)"},
            {transform:"translateY(-10px)"},
            {transform:"translateY(-6px)"}
        ],{
            duration:400
        });

    });

});


// =============================
// รูปโปรไฟล์หมุนเมื่อคลิก
// =============================
const img=document.querySelector(".profile img");

img.addEventListener("click",()=>{

    img.animate([
        {transform:"rotate(0deg)"},
        {transform:"rotate(360deg)"}
    ],{
        duration:1000
    });

});


// =============================
// พื้นหลังเปลี่ยนเฉดสีอัตโนมัติ
// =============================
let deg=135;

setInterval(()=>{

    deg++;

    document.body.style.background=
    `linear-gradient(${deg}deg,#0d47a1,#2196f3,#e3f2fd)`;

},80);

</script>

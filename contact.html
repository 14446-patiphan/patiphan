<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ติดต่อ | ปฏิภาณ</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#e3f2fd,#2196f3);
}

.container{
    width:90%;
    max-width:700px;
    background:#fff;
    padding:40px;
    border-radius:30px;
    box-shadow:0 20px 50px rgba(0,0,0,.2);
    text-align:center;
    animation:show 1s ease;
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-size:40px;
    color:#0d47a1;
    margin-bottom:20px;
}

.line{
    width:120px;
    height:5px;
    background:#2196f3;
    margin:0 auto 30px;
    border-radius:20px;
}

.contact{
    text-align:left;
}

.card{
    background:#eaf6ff;
    margin:15px 0;
    padding:18px 25px;
    border-radius:20px;
    border-left:6px solid #2196f3;
    font-size:20px;
    color:#333;
    transition:.3s;
}

.card:hover{
    transform:translateX(10px);
    background:#d7edff;
}

.card b{
    color:#1565c0;
}

.card a{
    color:#1565c0;
    text-decoration:none;
}

.card a:hover{
    text-decoration:underline;
}

.back{
    display:inline-block;
    margin-top:30px;
    padding:12px 35px;
    background:#1565c0;
    color:white;
    text-decoration:none;
    border-radius:50px;
    transition:.3s;
}

.back:hover{
    background:#0d47a1;
    transform:translateY(-5px);
}

@media(max-width:600px){
    h1{
        font-size:30px;
    }

    .card{
        font-size:17px;
    }
}
</style>

</head>

<body>

<div class="container">

    <h1>📞 ติดต่อฉัน</h1>

    <div class="line"></div>

    <div class="contact">

        <div class="card">
            <b>👤 ชื่อ :</b> นายปฏิภาณ ศรีประสิทธิ์
        </div>

        <div class="card">
            <b>📱 เบอร์โทร :</b> 08X-XXX-XXXX
        </div>

        <div class="card">
            <b>📧 Email :</b>
            <a href="mailto:example@gmail.com">example@gmail.com</a>
        </div>

        <div class="card">
            <b>💬 Facebook :</b>
            <a href="https://facebook.com/" target="_blank">
                facebook.com/yourname
            </a>
        </div>

        <div class="card">
            <b>📍 ที่อยู่ :</b> จังหวัดชลบุรี ประเทศไทย
        </div>

    </div>

    <a href="index.html" class="back">← กลับหน้าหลัก</a>

</div>

</body>
</html>
